---

- name: Restart snapclients
  ansible.builtin.systemd:
    name: "snapclient@{{ item.name }}.service"
    daemon_reload: yes
    state: restarted
    masked: no
    enabled: yes
  loop: "{{ snapclient_config }}"
  loop_control:
    label: "{{ item.name }}"
  ignore_errors: "{{ ansible_check_mode }}"
